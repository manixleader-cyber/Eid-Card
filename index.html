<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak</title>

<style>
canvas, .stars {
  pointer-events: none;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 2;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- Slide 1 -->
<div class="slide active">
  <h1>Enter Your Name 👤</h1>
  <input id="name" placeholder="Your Name">
  <button onclick="nextSlide()">Next</button>
</div>

<!-- Slide 2 -->
<div class="slide">
  <h1>How much do you love your friends? ❤️</h1>
  <button onclick="nextSlide()">A Lot 😍</button>
</div>

<!-- Slide 3 -->
<div class="slide">
  <h1>Best memory together? 😄</h1>
  <button onclick="nextSlide()">Many 😎</button>
</div>

<!-- Slide 4 -->
<div class="slide">
  <h1>Are you always there for your friends? 🤝</h1>
  <button onclick="nextSlide()">Yes 💯</button>
</div>

<!-- Final Slide -->
<div class="slide">
  <h1 id="finalText"></h1>
  <p>Eid Mubarak 🌙✨</p>
</div>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

function nextSlide() {
  slides[current].classList.remove("active");
  current++;
  slides[current].classList.add("active");

  if(current === slides.length - 1){
    let name = document.getElementById("name").value;
    document.getElementById("finalText").innerText =
      "Eid Mubarak " + name + " 🎉";
  }
}

// stars animation
for(let i=0;i<100;i++){
  let star = document.createElement("div");
  star.className="star";
  star.style.top=Math.random()*100+"%";
  star.style.left=Math.random()*100+"%";
  document.getElementById("stars").appendChild(star);
}
</script>

</body>
</html>
