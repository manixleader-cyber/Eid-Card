<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak</title>
<style>
body {
  margin: 0;
  background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

.card {
  text-align: center;
}

h1 {
  font-size: 60px;
  color: gold;
  animation: glow 2s infinite alternate;
}

p {
  font-size: 20px;
}

@keyframes glow {
  from { text-shadow: 0 0 10px gold; }
  to { text-shadow: 0 0 30px gold; }
}
</style>
</head>
<body>

<div class="card">
  <h1>Eid Mubarak 🌙</h1>
  <p>May Allah bless you with happiness and success</p>
</div>

</body>
</html>
