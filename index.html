<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
  color:white;
  text-align:center;
  overflow:hidden;
}

.slide {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active {
  display:flex;
}

h1 {
  color:gold;
  text-shadow:0 0 20px gold;
}

button {
  padding:10px 20px;
  margin-top:20px;
  background:gold;
  border:none;
  cursor:pointer;
  border-radius:10px;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
}

.stars {
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
}

.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:blink 2s infinite;
}

@keyframes blink {
  0%,100% {opacity:0;}
  50% {opacity:1;}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- Slide 1 -->
<div class="slide active">
  <h1>Enter Your Name 👤</h1>
  <input id="name" placeholder="Your Name">
  <button onclick="nextSlide()">Next</button>
</div>

<!-- Slide 2 -->
<div class="slide">
  <h1>How much do you love your friends? ❤️</h1>
  <button onclick="nextSlide()">A Lot 😍</button>
</div>

<!-- Slide 3 -->
<div class="slide">
  <h1>Best memory together? 😄</h1>
  <button onclick="nextSlide()">Many 😎</button>
</div>

<!-- Slide 4 -->
<div class="slide">
  <h1>Are you always there for your friends? 🤝</h1>
  <button onclick="nextSlide()">Yes 💯</button>
</div>

<!-- Final Slide -->
<div class="slide">
  <h1 id="finalText"></h1>
  <p>Eid Mubarak 🌙✨</p>
</div>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

function nextSlide() {
  slides[current].classList.remove("active");
  current++;
  slides[current].classList.add("active");

  if(current === slides.length - 1){
    let name = document.getElementById("name").value;
    document.getElementById("finalText").innerText =
      "Eid Mubarak " + name + " 🎉";
  }
}

// stars animation
for(let i=0;i<100;i++){
  let star = document.createElement("div");
  star.className="star";
  star.style.top=Math.random()*100+"%";
  star.style.left=Math.random()*100+"%";
  document.getElementById("stars").appendChild(star);
}
</script>

</body>
</html>
